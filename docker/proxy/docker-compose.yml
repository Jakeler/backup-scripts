services:
    proxy:
        container_name: caddy
        # image: caddy:latest
        build: . # see Dockerfile
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
            # - "4433:4433"
            # - 2019:2019
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:z
            - ./caddy_data:/data:z
            - ./caddy_config:/config:z
        env_file:
            - /root/keys/dynv6.env
        networks: # needs to be duplicated here, otherwise only in proxy_default
            - immich_default
            - monitoring_default
            - dns_ip6net

networks:
    immich_default:
        external: true
    monitoring_default:
        external: true
    dns_ip6net:
        external: true
        